# ─────────────────────────────────────────────────────────────────────────────
#  Logstash → Elastic Cloud credentials
#
#  IMPORTANT: Fill in your actual values before applying.
#  NEVER commit this file with real credentials to version control.
#  Consider using `kubectl create secret` or a secrets manager instead.
#
#  Apply with:
#    kubectl apply -f logstash/secret.yaml
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: elastic-credentials
  namespace: elastic-stack
type: Opaque
stringData:
  # Your Elastic Cloud ES endpoint (no trailing slash)
  # Found in: Elastic Cloud → Your Deployment → Manage → Copy endpoint
  ES_ENDPOINT: "https://mlykins-home-o11y-af8c2d.es.us-east-2.aws.elastic.cloud:443"

  # API key with write permissions (index, create_index on logs-*, metrics-*)
  # Create in: Kibana → Stack Management → API Keys → Create API Key
  ES_API_KEY: "YcQf6ZwB3I0m6KKaInjC:IKSuhxs6iKrUlCmhbH3h-w"
