apiVersion: v1
kind: Service
metadata:
  name: logstash
  namespace: elastic-stack
  labels:
    app: logstash
    app.kubernetes.io/name: logstash
    app.kubernetes.io/part-of: elastic-stack
spec:
  # NodePort exposes Logstash on your local machine so you can send
  # data from outside the cluster (e.g., Filebeat running on your Mac).
  # ClusterIP is sufficient if all shippers run inside the cluster.
  type: NodePort
  selector:
    app: logstash
  ports:
    # Beats input — Filebeat, Metricbeat, Heartbeat, etc.
    - name: beats
      port: 5044
      targetPort: beats
      nodePort: 30044
      protocol: TCP

    # HTTP input — JSON POST from any client
    - name: http-input
      port: 8080
      targetPort: http-input
      nodePort: 30080
      protocol: TCP

    # Logstash monitoring API — used by readiness/liveness probes
    # and by Elastic Agent's Logstash integration
    - name: monitoring
      port: 9600
      targetPort: monitoring
      protocol: TCP
