apiVersion: apps/v1
kind: Deployment
metadata:
  name: logstash
  namespace: elastic-stack
  labels:
    app: logstash
    app.kubernetes.io/name: logstash
    app.kubernetes.io/part-of: elastic-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: logstash
  template:
    metadata:
      labels:
        app: logstash
        app.kubernetes.io/name: logstash
    spec:
      # Allow graceful shutdown — Logstash needs time to flush its persistent queue
      terminationGracePeriodSeconds: 60

      containers:
        - name: logstash
          # Check https://www.docker.elastic.co for the latest tag
          image: docker.elastic.co/logstash/logstash:9.0.3
          imagePullPolicy: IfNotPresent

          ports:
            - name: beats
              containerPort: 5044
              protocol: TCP
            - name: http-input
              containerPort: 8080
              protocol: TCP
            - name: monitoring
              containerPort: 9600
              protocol: TCP

          env:
            - name: ES_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: elastic-credentials
                  key: ES_ENDPOINT
            - name: ES_API_KEY
              valueFrom:
                secretKeyRef:
                  name: elastic-credentials
                  key: ES_API_KEY
            # Heap: keep Xmx ≤ 50% of container memory limit
            - name: LS_JAVA_OPTS
              value: "-Xmx512m -Xms512m"
            - name: LOGSTASH_VERSION
              value: "9.0.3"

          # Conservative limits for Docker Desktop — adjust as needed
          resources:
            requests:
              cpu: "250m"
              memory: "768Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"

          volumeMounts:
            # logstash.yml and pipelines.yml go into the config dir
            - name: logstash-config
              mountPath: /usr/share/logstash/config/logstash.yml
              subPath: logstash.yml
              readOnly: true
            - name: logstash-config
              mountPath: /usr/share/logstash/config/pipelines.yml
              subPath: pipelines.yml
              readOnly: true
            # Pipeline definition
            - name: logstash-pipeline
              mountPath: /usr/share/logstash/pipeline/logstash.conf
              subPath: logstash.conf
              readOnly: true
            # Persistent queue survives pod restarts (uses emptyDir for simplicity;
            # replace with a PVC for true persistence across node rescheduling)
            - name: logstash-data
              mountPath: /usr/share/logstash/data

          livenessProbe:
            httpGet:
              path: /
              port: monitoring
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5

          readinessProbe:
            httpGet:
              path: /
              port: monitoring
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

      volumes:
        - name: logstash-config
          configMap:
            name: logstash-config
            items:
              - key: logstash.yml
                path: logstash.yml
              - key: pipelines.yml
                path: pipelines.yml

        - name: logstash-pipeline
          configMap:
            name: logstash-config
            items:
              - key: logstash.conf
                path: logstash.conf

        # Replace with a PersistentVolumeClaim if you need durability across evictions
        - name: logstash-data
          emptyDir: {}
