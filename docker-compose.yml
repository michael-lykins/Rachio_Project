services:
  rachio-collector:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rachio-collector
    restart: unless-stopped

    # All sensitive config lives in .env — never hard-coded
    env_file:
      - .env

    environment:
      # These can be overridden here or left to .env
      - ENVIRONMENT=production
      - LOG_LEVEL=${LOG_LEVEL:-INFO}

      # OTel — passed through from .env to the SDK
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT}
      - OTEL_EXPORTER_OTLP_HEADERS=${OTEL_EXPORTER_OTLP_HEADERS}
      - OTEL_METRIC_EXPORT_INTERVAL_MS=${OTEL_METRIC_EXPORT_INTERVAL_MS:-30000}

      # Service identity + environment shown in Elastic APM
      - OTEL_SERVICE_NAME=rachio-collector
      - OTEL_SERVICE_VERSION=1.0.0
      - OTEL_RESOURCE_ATTRIBUTES=deployment.environment=production

    # Resource limits — conservative for a background collector
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
        reservations:
          cpus: "0.10"
          memory: 64M

    # Use default bridge network — works cleanly on macOS Docker Desktop.
    networks:
      - rachio-net

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  rachio-net:
    driver: bridge
